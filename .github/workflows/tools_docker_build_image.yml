---
name: Tools - Docker Build Test

"on":
  workflow_dispatch:
  pull_request:
    branches:
      - "master"
    paths:
      - '**Dockerfile'
      - 'docker/parsedmarc/requirements.txt'

permissions:
  contents: read

env:
  REGISTRY_PLATFORMS: ${{ vars.REGISTRY_PLATFORMS }}

jobs:
  docker-build-image:
    name: Docker Build Image
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        dockerfile: [elasticsearch, kibana, nginx, parsedmarc, utils, logrotate]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build docker images
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: ./docker/${{ matrix.dockerfile }}/Dockerfile
          platforms: ${{ env.REGISTRY_PLATFORMS }}
